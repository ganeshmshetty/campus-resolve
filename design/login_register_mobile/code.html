<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CampusResolve - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {

                        "on-tertiary-container": "#ffd4c5",

                        "on-background": "#191b23",
                        "primary": "#003fb1",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434654",
                        "tertiary-fixed": "#ffdbcf",
                        "surface-container-low": "#f3f3fe",
                        "on-surface": "#191b23",
                        "background": "#faf8ff",
                        "on-primary-fixed-variant": "#003dab",
                        "surface-dim": "#d9d9e4",
                        "secondary-fixed": "#d9e3f4",
                        "on-secondary-fixed-variant": "#3e4755",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#380d00",
                        "on-tertiary-fixed-variant": "#802a00",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-container": "#1a56db",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#121c28",
                        "surface-container-highest": "#e2e1ed",
                        "surface": "#faf8ff",
                        "inverse-on-surface": "#f0f0fb",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e7e7f3",
                        "secondary-container": "#d6e0f1",
                        "on-primary-fixed": "#00174d",
                        "outline": "#737686",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-container": "#596372",
                        "surface-container": "#ededf8",
                        "tertiary-container": "#ad3b00",
                        "surface-tint": "#1353d8",
                        "surface-bright": "#faf8ff",
                        "inverse-primary": "#b5c4ff",
                        "outline-variant": "#c3c5d7",
                        "on-primary-container": "#d4dcff",
                        "inverse-surface": "#2e3039",
                        "error": "#ba1a1a",
                        "secondary": "#555f6d",
                        "tertiary": "#852b00",
                        "secondary-fixed-dim": "#bdc7d8",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "xs": "4px",
                        "margin-desktop": "64px",
                        "max-width": "1200px",
                        "xl": "40px",
                        "sm": "8px",
                        "lg": "24px",
                        "margin-mobile": "16px",
                        "md": "16px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-sm": ["Public Sans"],
                        "caption": ["Public Sans"],
                        "label-bold": ["Public Sans"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-md">
<!-- Login/Register Card -->
<main class="w-full max-w-sm bg-surface-container-lowest rounded-xl border border-surface-variant p-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
<!-- Header -->
<div class="text-center mb-xl">
<h1 class="font-h2 text-h2 text-primary mb-sm">CampusResolve</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to report and track issues</p>
</div>
<!-- Single Sign-On Button -->
<button class="w-full flex items-center justify-center gap-sm bg-primary text-on-primary rounded-lg py-md px-lg font-label-bold text-label-bold hover:bg-on-primary-fixed-variant transition-colors mb-lg">
<span class="material-symbols-outlined text-[20px]">school</span>
            Sign in with Campus Email
        </button>
<!-- Divider -->
<div class="flex items-center gap-sm mb-lg">
<div class="h-px bg-surface-variant flex-1"></div>
<span class="font-caption text-caption text-on-surface-variant px-sm">OR</span>
<div class="h-px bg-surface-variant flex-1"></div>
</div>
<!-- Form Fields -->
<form class="space-y-md">
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" placeholder="name@campus.edu" type="email"/>
</div>
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-xs" for="password">Password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center justify-between mt-sm">
<label class="flex items-center gap-xs cursor-pointer">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" type="checkbox"/>
<span class="font-caption text-caption text-on-surface-variant">Remember me</span>
</label>
<a class="font-caption text-caption text-primary hover:text-on-primary-fixed-variant" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-surface-container-high text-on-surface rounded-lg py-md px-lg font-label-bold text-label-bold hover:bg-surface-variant transition-colors mt-lg border border-surface-variant" type="submit">
                Sign In
            </button>
</form>
<!-- Footer / Register Link -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? <a class="text-primary font-label-bold text-label-bold hover:text-on-primary-fixed-variant" href="#">Register here</a>
</p>
</div>
</main>
</body></html>
